<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Image Compressor</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px auto;
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
}

.drop {
  border: 2px dashed #aaa;
  padding: 20px;
  margin: 10px 0;
}

img {
  max-width: 100%;
  margin-top: 10px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  background: #007bff;
  color: white;
  border: none;
}
</style>

<body>

<div class="container">
  <h2>Advanced Image Tool</h2>

  <div class="drop" id="dropArea">
    Drag & Drop Images Here
    <br>
    <input type="file" id="upload" multiple accept="image/*">
  </div>

  <p>Quality: <span id="q">0.7</span></p>
  <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">

  <p>Format:</p>
  <select id="format">
    <option value="image/jpeg">JPG</option>
    <option value="image/png">PNG</option>
    <option value="image/webp">WebP</option>
  </select>

  <p>Resize (optional)</p>
  <input type="number" id="width" placeholder="Width">
  <input type="number" id="height" placeholder="Height">

  <button onclick="processImages()">Process Images</button>

  <div id="output"></div>
</div>

quality.oninput = () => qText.innerText = quality.value;

};
